stages:
  download_data:
    cmd: python src/download_data.py
    deps:
      - src/download_data.py
    params:
      - data.dataset_id
    outs:
      - data/penguins.csv

  prepare_data:
    cmd: python src/prepare_data.py
    deps:
      - src/prepare_data.py
      - data/penguins.csv
    params:
      - prepare.test_size
      - prepare.random_state
    outs:
      - data/train.csv
      - data/test.csv
      - models/encoder.pkl

  train_model:
    cmd: python src/train_model.py
    deps:
      - src/train_model.py
      - data/train.csv
      - data/test.csv
    params:
      - experiment.name
    outs:
      - models/model.pkl

  evaluate:
    cmd: python src/evaluate.py
    deps:
      - src/evaluate.py
      - models/model.pkl
    params:
      - experiment.name
    metrics:
      - metrics.json:
          cache: false

  register_bentoml:
    cmd: python src/register_bentoml.py
    deps:
      - src/register_bentoml.py
      - models/model.pkl
    params:
      - experiment.name
